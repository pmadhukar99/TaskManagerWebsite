name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    
    - name: Install dependencies
      working-directory: backend
      run: npm install
    
    - name: Check code style (optional)
      working-directory: backend
      continue-on-error: true
      run: |
        npm install --save-dev eslint
        npx eslint . --fix || true
    
    - name: Verify server startup
      working-directory: backend
      env:
        MONGODB_URI: mongodb://localhost:27017/task-manager-test
        JWT_SECRET: test-secret-key
        PORT: 5000
      run: |
        timeout 5 npm start || true
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: backend-logs
        path: logs/
        retention-days: 5
