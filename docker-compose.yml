version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: task_manager_db
    environment:
      MONGO_INITDB_DATABASE: task-manager
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - task_manager_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task_manager_backend
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/task-manager
      JWT_SECRET: your_jwt_secret_key_here
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - task_manager_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: task_manager_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - task_manager_network

volumes:
  mongodb_data:

networks:
  task_manager_network:
    driver: bridge
